# =============================================================
# ECS Nginx 配置 — SSL 终结 + 反向代理到 frp 隧道
#
# 架构：
#   用户 → ECS nginx (443 SSL终结) → 127.0.0.1:6003 (frps监听) → frp隧道 → 家里 nginx:80
#   用户 → ECS nginx (80) → 301重定向到 HTTPS
#
# 注意：frps 的 nginx-http 穿透规则 remotePort=6003（不用80，避免和 ECS nginx 冲突）
#
# 安装位置：/etc/nginx/conf.d/mahongwei.conf
# =============================================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name mahongwei.com.cn www.mahongwei.com.cn;

    # Let's Encrypt 验证路径（certbot webroot 模式需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 主站 — SSL 终结后转发到 frp 隧道（127.0.0.1:6003）
server {
    listen 443 ssl;
    http2 on;
    server_name mahongwei.com.cn www.mahongwei.com.cn;

    # SSL 证书（Let's Encrypt）
    ssl_certificate     /etc/letsencrypt/live/mahongwei.com.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mahongwei.com.cn/privkey.pem;

    # SSL 优化
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # 所有请求转发到 frps 监听的 6003 端口
    # frpc 穿透规则: localPort=80(家里nginx), remotePort=6003(ECS上frps监听)
    # ECS nginx 占了 80 端口做 HTTPS 重定向，所以 frps 不能用 80
    location / {
        proxy_pass http://127.0.0.1:6003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120;
    }
}
