events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ===== 后端服务 =====
    upstream ai_backend {
        server ai-server:8000;
    }

    upstream vehicle_backend {
        server vehicle-backend:8001;
    }

    upstream vehicle_runtime {
        server vehicle-runtime:4000;
    }

    upstream vehicle_frontend {
        server vehicle-frontend:80;
    }

    # ===== HTTP 主站 =====
    # SSL 由 ECS 上的 nginx 处理，这里只做 HTTP 反向代理
    server {
        listen 80;
        server_name mahongwei.com.cn www.mahongwei.com.cn;

        # Let's Encrypt 验证路径（certbot standalone 不走这里，但 webroot 模式需要）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ----- 主站前端 -----
        location / {
            proxy_pass http://web:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # AI API
        location /api/ai/ {
            proxy_pass http://ai_backend/api/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;
            client_max_body_size 100m;
        }

        # 知识库 API
        location /api/knowledge/ {
            proxy_pass http://ai_backend/api/knowledge/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;
            client_max_body_size 100m;
        }

        # ----- 车载助手 -----
        # 车载助手前端（SPA）
        location /vehicle/ {
            proxy_pass http://vehicle_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 车载助手后端 API
        location /api/vehicle/ {
            proxy_pass http://vehicle_backend/api/vehicle/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # CopilotKit Runtime（WebSocket）
        location /api/copilotkit {
            proxy_pass http://vehicle_runtime/api/copilotkit;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }
    }
}
