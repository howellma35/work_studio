events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Docker 内置 DNS，容器 IP 变化时自动重新解析（不需要重启 nginx）
    resolver 127.0.0.11 valid=10s;

    # ===== HTTP 主站 =====
    # SSL 由 ECS 上的 nginx 处理，这里只做 HTTP 反向代理
    server {
        listen 80;
        server_name mahongwei.com.cn www.mahongwei.com.cn;

        # Let's Encrypt 验证路径（certbot standalone 不走这里，但 webroot 模式需要）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ----- 主站前端 -----
        location / {
            set $upstream_web http://web:80;
            proxy_pass $upstream_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # AI API
        location /api/ai/ {
            set $upstream_ai http://ai-server:8000;
            proxy_pass $upstream_ai/api/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;
            client_max_body_size 100m;
        }

        # 知识库 API
        location /api/knowledge/ {
            set $upstream_ai http://ai-server:8000;
            proxy_pass $upstream_ai/api/knowledge/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;
            client_max_body_size 100m;
        }

        # ----- 车载助手 -----
        # 车载助手前端（SPA）
        location /vehicle/ {
            set $upstream_vf http://vehicle-frontend:80;
            proxy_pass $upstream_vf/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 车载助手后端 API
        location /api/vehicle/ {
            set $upstream_vb http://vehicle-backend:8001;
            proxy_pass $upstream_vb/api/vehicle/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # CopilotKit Runtime（WebSocket）
        location /api/copilotkit {
            set $upstream_vr http://vehicle-runtime:4000;
            proxy_pass $upstream_vr/api/copilotkit;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }
    }
}
