events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # AI 后端服务
    upstream ai_backend {
        server ai-server:8000;
    }

    # Langfuse observability (direct access via serverIP:3000, no nginx proxy needed)

    server {
        listen 80;
        server_name mahongwei.com.cn www.mahongwei.com.cn;

        # Let's Encrypt 验证路径（获取证书时需要）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # HTTP -> HTTPS 重定向（其他所有请求）
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name mahongwei.com.cn www.mahongwei.com.cn;
        
        # SSL 证书配置
        ssl_certificate     /etc/letsencrypt/live/mahongwei.com.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mahongwei.com.cn/privkey.pem;
        
        # SSL 优化配置
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # 前端静态资源（通过 web 容器 nginx 提供 SPA 回退）
        location / {
            proxy_pass http://web:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # AI API 代理
        location /api/ai/ {
            proxy_pass http://ai_backend/api/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;
            client_max_body_size 50m;
        }

        # 知识库 API 代理
        location /api/knowledge/ {
            proxy_pass http://ai_backend/api/knowledge/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;
            client_max_body_size 100m;
        }
    }
}
