events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ===== 后端服务 =====
    upstream ai_backend {
        server ai-server:8000;
    }

    upstream vehicle_backend {
        server vehicle-backend:8001;
    }

    upstream vehicle_runtime {
        server vehicle-runtime:4000;
    }

    upstream vehicle_frontend {
        server vehicle-frontend:80;
    }

    # ===== HTTP → HTTPS =====
    server {
        listen 80;
        server_name mahongwei.com.cn www.mahongwei.com.cn;

        # Let's Encrypt 验证路径
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # ===== HTTPS 主站 =====
    server {
        listen 443 ssl http2;
        server_name mahongwei.com.cn www.mahongwei.com.cn;

        # SSL 证书配置
        ssl_certificate     /etc/letsencrypt/live/mahongwei.com.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mahongwei.com.cn/privkey.pem;

        # SSL 优化配置
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # ----- 主站前端 -----
        location / {
            proxy_pass http://web:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # AI API
        location /api/ai/ {
            proxy_pass http://ai_backend/api/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;
            client_max_body_size 100m;
        }

        # 知识库 API
        location /api/knowledge/ {
            proxy_pass http://ai_backend/api/knowledge/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;
            client_max_body_size 100m;
        }

        # ----- 车载助手 -----
        # 车载助手前端（SPA）
        location /vehicle/ {
            proxy_pass http://vehicle_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 车载助手后端 API
        location /api/vehicle/ {
            proxy_pass http://vehicle_backend/api/vehicle/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # CopilotKit Runtime（WebSocket）
        location /api/copilotkit {
            proxy_pass http://vehicle_runtime/api/copilotkit;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }
    }
}
