version: '3.8'

services:
  # Python 游戏后端（猜词游戏 WebSocket）
  game-server:
    build:
      context: ../game-server
      dockerfile: Dockerfile
    container_name: raggame-game-server
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ../game-server/.env
    volumes:
      - game-data:/app/data
      - game-logs:/app/logs

  # Python AI 后端（AI 聊天 + PDF 解析）
  ai-server:
    build:
      context: ../ai-server
      dockerfile: Dockerfile
    container_name: raggame-ai-server
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ../ai-server/.env
    volumes:
      - ai-logs:/app/logs

  # Web 前端
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: raggame-web
    restart: always

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: raggame-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - game-server
      - ai-server
      - web

volumes:
  game-data:
  redis-data:
  game-logs:
  ai-logs:
