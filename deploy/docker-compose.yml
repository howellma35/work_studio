services:
  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  # Python AI 后端（AI 聊天 + RAG 知识库）
  ai-server:
    build:
      context: ../ai-server
      dockerfile: Dockerfile
    container_name: raggame-ai-server
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ai-logs:/app/logs
    depends_on:
      - qdrant

  # Web 前端
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: raggame-web
    restart: always

  # ===== Langfuse 可观测性平台 =====
  # PostgreSQL 数据库
  langfuse-db:
    image: postgres:15-alpine
    container_name: langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-changeme123}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ClickHouse (OLAP engine for Langfuse V3)
  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.1-alpine
    container_name: langfuse-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse123}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
      - langfuse-clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user default --password ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse123} --query 'SELECT 1'"
      interval: 15s
      timeout: 5s
      retries: 10

  # Redis (task queue + cache for Langfuse V3)
  langfuse-redis:
    image: redis:7-alpine
    container_name: langfuse-redis
    restart: unless-stopped
    command: redis-server --requirepass ${LANGFUSE_REDIS_PASSWORD:-redis123}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${LANGFUSE_REDIS_PASSWORD:-redis123}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - langfuse-redis-data:/data

  # Langfuse Web 应用
  langfuse:
    image: langfuse/langfuse:3
    container_name: langfuse-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
    environment:
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER:-minioadmin}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD:-minioadmin123}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-changeme123}@langfuse-db:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://default:${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse123}@langfuse-clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse123}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${LANGFUSE_REDIS_PASSWORD:-redis123}
      REDIS_AUTH: ${LANGFUSE_REDIS_PASSWORD:-redis123}
      NEXTAUTH_URL: http://${SERVER_IP:-localhost}:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-my-nextauth-secret-change-in-production}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-my-secret-key-change-in-production}
      SALT: ${LANGFUSE_SALT:-mysalt123}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_SIGNUP: "true"
      NEXT_PUBLIC_SITE_URL: http://${SERVER_IP:-localhost}:3000

  # Langfuse MinIO (S3-compatible storage for V3)
  langfuse-minio:
    image: minio/minio:latest
    container_name: langfuse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - langfuse-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Create langfuse-events bucket in MinIO
  langfuse-minio-init:
    image: minio/mc:latest
    container_name: langfuse-minio-init
    depends_on:
      langfuse-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set langfuse http://langfuse-minio:9000 ${LANGFUSE_MINIO_ROOT_USER:-minioadmin} ${LANGFUSE_MINIO_ROOT_PASSWORD:-minioadmin123} &&
      mc mb langfuse/langfuse-events --ignore-existing &&
      exit 0
      "

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: raggame-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - ai-server
      - web

volumes:
  ai-logs:
  qdrant-data:
  langfuse-db-data:
  langfuse-clickhouse-data:
  langfuse-clickhouse-logs:
  langfuse-redis-data:
  langfuse-minio-data:
