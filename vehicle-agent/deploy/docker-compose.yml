services:
  # ===== AutoMind backend (FastAPI + LangGraph + MCP) =====
  vehicle-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: automind-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8001}:${BACKEND_PORT:-8001}"
    env_file:
      - .env
    volumes:
      - vehicle-data:/app/data
      - vehicle-logs:/app/logs
    networks:
      - automind-net

  # ===== AutoMind CopilotKit Runtime (Express + HttpAgent) =====
  # Official Runtime layer: Frontend → Runtime → Python backend
  vehicle-runtime:
    build:
      context: ../runtime
      dockerfile: Dockerfile
    container_name: automind-runtime
    restart: always
    ports:
      - "${RUNTIME_PORT:-4000}:${RUNTIME_PORT:-4000}"
    environment:
      - RUNTIME_PORT=${RUNTIME_PORT:-4000}
      - PYTHON_AGENT_URL=http://vehicle-backend:${BACKEND_PORT:-8001}/copilotkit
    depends_on:
      - vehicle-backend
    networks:
      - automind-net

  # ===== AutoMind frontend (React + CopilotKit) =====
  vehicle-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost:8001}
    container_name: automind-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-5174}:80"
    depends_on:
      - vehicle-backend
      - vehicle-runtime
    networks:
      - automind-net

 # ===== Langfuse observability =====
  # Langfuse web container (frontend + API)
  langfuse-web:
    image: langfuse/langfuse:3
    container_name: automind-langfuse-web
    restart: unless-stopped
    ports:
      - "${LANGFUSE_PORT:-3001}:3000"
    depends_on: &langfuse-depends-on
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
    environment: &langfuse-env
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://default:${LANGFUSE_CLICKHOUSE_PASSWORD}@langfuse-clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${LANGFUSE_REDIS_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      SALT: ${LANGFUSE_SALT}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_SIGNUP: "true"
      NEXTAUTH_URL: http://${SERVER_IP}:${LANGFUSE_PORT:-3001}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      NEXT_PUBLIC_SITE_URL: http://${SERVER_IP}:${LANGFUSE_PORT:-3001}
    networks:
      - automind-net

  # Langfuse worker container (processes Redis queue → ClickHouse)
  # THIS IS THE MISSING PIECE: without worker, traces go into Redis queue but never get processed/stored!
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: automind-langfuse-worker
    restart: unless-stopped
    depends_on: *langfuse-depends-on
    environment:
      <<: *langfuse-env
    networks:
      - automind-net

  # Langfuse PostgreSQL
  langfuse-db:
    image: postgres:15-alpine
    container_name: automind-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - automind-net

  # Langfuse ClickHouse (OLAP engine for V3)
  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.1-alpine
    container_name: automind-langfuse-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
      - langfuse-clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user default --password ${LANGFUSE_CLICKHOUSE_PASSWORD} --query 'SELECT 1'"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - automind-net

  # Langfuse Redis (task queue + cache)
  langfuse-redis:
    image: redis:7-alpine
    container_name: automind-langfuse-redis
    restart: unless-stopped
    command: redis-server --requirepass ${LANGFUSE_REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${LANGFUSE_REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - langfuse-redis-data:/data
    networks:
      - automind-net

  # Langfuse MinIO (S3-compatible storage for V3 event uploads)
  langfuse-minio:
    image: minio/minio:latest
    container_name: automind-langfuse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_MINIO_ROOT_PASSWORD}
    volumes:
      - langfuse-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - automind-net

  # Create langfuse-events bucket in MinIO on first start
  langfuse-minio-init:
    image: minio/mc:latest
    container_name: automind-langfuse-minio-init
    depends_on:
      langfuse-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set langfuse http://langfuse-minio:9000 ${LANGFUSE_MINIO_ROOT_USER} ${LANGFUSE_MINIO_ROOT_PASSWORD} &&
      mc mb langfuse/langfuse --ignore-existing &&
      exit 0
      "
    networks:
      - automind-net

  # ===== ChromaDB vector DB (long-term memory) =====
  chromadb:
    image: chromadb/chroma:latest
    container_name: automind-chromadb
    restart: unless-stopped
    ports:
      - "${CHROMA_PORT:-8002}:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "false"
    networks:
      - automind-net

volumes:
  vehicle-data:
  vehicle-logs:
  langfuse-db-data:
  langfuse-clickhouse-data:
  langfuse-clickhouse-logs:
  langfuse-redis-data:
  langfuse-minio-data:
  chromadb-data:

networks:
  automind-net:
    driver: bridge
